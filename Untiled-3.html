<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jerry The GOAT</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ff512f,#dd2476,#6a11cb,#2575fc);
    background-size:400% 400%;
    animation:bg 10s infinite alternate;
}

@keyframes bg{
    0%{background-position:left;}
    100%{background-position:right;}
}

.container{
    text-align:center;
}

h1{
    font-size:90px;
    color:white;
    text-shadow:0 0 20px gold;
    animation:bounce 1s infinite alternate;
}

p{
    font-size:35px;
    color:white;
    margin-top:20px;
}

button{
    margin-top:30px;
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:30px;
    background:gold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.1);
}

@keyframes bounce{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-20px);
    }
}
</style>

</head>
<body>

<div class="container">
    <h1>🐐 JERRY THE GOAT 🐐</h1>
    <p>The Greatest of All Time!</p>

    <button onclick="cheer()">
        Click Me!
    </button>
</div>

<script>
function cheer(){
    alert("🐐 JERRY IS THE GOAT! 🐐");
}
</script>

</body>
</html>
